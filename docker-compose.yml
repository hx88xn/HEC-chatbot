version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    ports:
      - "7013:7013"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7013/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
